model:
  name: "facebook/wav2vec2-base"
  ctc_loss_reduction: "mean"

dataset:
  name: "librispeech_asr"
  subset: "clean"
  train_split: "train.100"
  valid_split: "validation"
  target_sampling_rate: 16000

training:
  seed: 42
  types:
    baseline:
      output_dir: "results/baseline"
    static:
      subfolder: "noises/static"
      snr_range:
        min: 0
        max: 15
      output_dir: "results/static"
    complex:
      subfolder: "noises/complex"
      snr_range:
        min: 0
        max: 15
      output_dir: "results/complex"
    babble:
      subfolder: "noises/babble"
      snr_range:
        min: 10
        max: 25
      output_dir: "results/babble"
    all:
      output_dir: "results/all"
  
  apply_augmentation: true
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  num_train_epochs: 2
  learning_rate: 0.000001 # 1e-4
  max_steps: 5000
  logging_steps: 250
  warmup_steps: 500
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  metric_for_best_model: "cer"